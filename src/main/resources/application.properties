spring.application.name=loginsystem
spring.datasource.url=jdbc:h2:file:./db/loginsystem;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
server.port=8082
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.driverClassName=org.h2.Driver

# ===============================
# BIOMETRIC PYTHON PROPERTIES
# ===============================
biometric.python-executable=${PYTHON_EXE:../python_biometric/.venv/Scripts/python.exe}
biometric.script-path=${SCRIPT_PATH:../python_biometric/face_detect_json.py}

# Face recognition confidence threshold (lower = stricter match required)
biometric.lbph-threshold=75.0

# Liveness score threshold — below this value the scan is treated as a spoof
# Range [0, 1]. Raise to make stricter; lower if too many false rejections.
biometric.liveness-threshold=0.25

# Rate limiting: max biometric scan attempts per IP per minute
biometric.rate-limit-per-minute=10


